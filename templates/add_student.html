<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add student</title>
</head>

<body class="d-flex flex-column min-vh-100">
    <main class="flex-grow-1">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="/">Student Management</a>
                <ul class="navbar-nav ms-auto d-flex flex-row gap-3">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav" href="/add_student">Add Student</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/view_students">View Students</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/search_student">Search Student</a>
                    </li>


                </ul>
            </div>
        </nav>
        <div class="container pt-5 text-center">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card shadow-lg rounded-3">
                        <div class="card-body p-5">
                            <h3 class="card-title text-center text-primary">Add student</h3>
                            <form action="/add_student" method="post">
                                <label for="name" class="form-label">Name:</label>
                                <input type="text" id="name" name="name" placeholder="Enter name" class="form-control"
                                    required>
                                <br>
                                <label for="age" class="form-label">Age:</label>
                                <input type="number" id="age" name="age" placeholder="Enter age" class="form-control"
                                    required>
                                <br>
                                <label for="course" class="form-label">Course:</label>
                                <input type="text" id="course" name="course" placeholder="Enter course"
                                    class="form-control" required>
                                <br>
                                <div class="text-center mt-4">
                                    <button type="submit" class="btn btn-success mt-3"><i
                                            class="bi bi-plus-circle me-1"></i>Add Student</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        </div>
    </main>
</body>
<footer class="bg-dark text-white text-center py-3 mt-5">
    Student Management System © 2026 | Developed by Nuved Khan
</footer>


</html>
